argo-cd:
  global:
    domain: argocd.yourdomain.com   # change to your domain

  configs:
    # configs.params keys must NOT use dot-notation in chart >= 7.x
    # server.insecure is now set via server.extraArgs below
    params:
      create: true   # required — tells the chart to create the ConfigMap

    cm:
      create: true
      exec.enabled: "true"
      timeout.reconciliation: 180s
      application.resourceTrackingMethod: annotation

    rbac:
      create: true
      policy.default: role:readonly
      policy.csv: |
        p, role:admin, applications, *, */*, allow
        p, role:admin, clusters,     *, *, allow
        p, role:admin, repositories, *, *, allow
        p, role:admin, projects,     *, *, allow

        g, argocd-admins, role:admin

  server:
    replicas: 1

    # Run without TLS — recommended when ingress handles TLS termination
    extraArgs:
      - --insecure

    ingress:
      enabled: false
      # ingressClassName: nginx
      # annotations:
      #   cert-manager.io/cluster-issuer: letsencrypt-prod
      # tls: true

  applicationSet:
    replicas: 1

  controller:
    replicas: 1

  redis:
    enabled: true

  notifications:
    enabled: true

  dex:
    enabled: false
