apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: platform
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  project: platform
  source:
    repoURL: https://github.com/wesleyfebarretos/argocd-control-plane.git
    targetRevision: main
    path: argocd
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
