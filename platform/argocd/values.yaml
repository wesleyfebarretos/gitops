argo-cd:
  global:
    domain: argocd.local   # change to your domain

  configs:
    # configs.params keys must NOT use dot-notation in chart >= 7.x
    # server.insecure is now set via server.extraArgs below
    params:
      create: true   # required — tells the chart to create the ConfigMap

    cm:
      create: true
      exec.enabled: "true"
      timeout.reconciliation: 180s
      application.resourceTrackingMethod: annotation

    rbac:
      create: true
      policy.default: role:readonly
      policy.csv: |
        p, role:admin, applications, *, */*, allow
        p, role:admin, clusters,     *, *, allow
        p, role:admin, repositories, *, *, allow
        p, role:admin, projects,     *, *, allow

        g, argocd-admins, role:admin

  server:
    replicas: 1

    # TLS terminates at the platform Gateway; Argo CD serves plain HTTP internally.
    extraArgs:
      - --insecure

    ingress:
      enabled: false

    httproute:
      enabled: true
      parentRefs:
        - name: platform
          namespace: envoy-gateway-system
          sectionName: https
      hostnames:
        - argocd.local
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /

    grpcroute:
      enabled: true
      parentRefs:
        - name: platform
          namespace: envoy-gateway-system
          sectionName: https
      hostnames:
        - argocd.local

  applicationSet:
    replicas: 1

  controller:
    replicas: 1

  redis:
    enabled: true

  notifications:
    enabled: true

  dex:
    enabled: false
