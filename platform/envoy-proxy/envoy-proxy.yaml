# Pins Envoy NodePorts for Kind extraPortMappings (see scripts/kind-config.yaml).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: kind
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: NodePort
        patch:
          type: StrategicMerge
          value:
            spec:
              ports:
                - name: http
                  nodePort: 30080
                  port: 80
                  protocol: TCP
                  targetPort: 10080
                - name: https
                  nodePort: 30443
                  port: 443
                  protocol: TCP
                  targetPort: 10443
