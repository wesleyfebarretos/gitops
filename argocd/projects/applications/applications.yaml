apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: applications
  namespace: argocd
spec:
  description: Applications deployments with restricted repo and namespaces
  sourceRepos:
    - https://github.com/wesleyfebarretos/argocd-applications.git
  sourceNamespaces:
    - applications
  destinations:
    - namespace: '!kube-system'
      server: https://kubernetes.default.svc
    - namespace: '!argocd'
      server: https://kubernetes.default.svc
    - namespace: '!cert-manager'
      server: https://kubernetes.default.svc
    - namespace: '!envoy-gateway-system'
      server: https://kubernetes.default.svc
    - namespace: '*-prod'
      server: https://kubernetes.default.svc
    - namespace: '*-stg'
      server: https://kubernetes.default.svc
    - namespace: '*-dev'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: "Namespace"
  namespaceResourceWhitelist:
    # argoproj.io/v1alpha1
    - group: 'argoproj.io'
      kind: Application
    - group: 'argoproj.io'
      kind: ApplicationSet
    # core/v1
    - group: ''
      kind: Service
    - group: ''
      kind: Secret
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: ServiceAccount
    # apps/v1
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    # autoscaling/v2
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    # networking.k8s.io/v1
    - group: networking.k8s.io
      kind: Ingress
    # gateway.networking.k8s.io/v1
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
  orphanedResources:
    warn: false
  roles:
    - name: admin
      description: Full access within applications project
      policies:
        - p, proj:applications:admin, applications, *, applications/*, allow
      groups:
        - wesleyfebarretos@gmail.com
