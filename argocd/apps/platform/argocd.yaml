apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default

  sources:
    - repoURL: https://github.com/wesleyfebarretos/gitops.git
      targetRevision: main
      path: platform/argocd
    - repoURL: https://github.com/wesleyfebarretos/gitops.git
      targetRevision: main
      path: platform/argocd/bootstrap

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
